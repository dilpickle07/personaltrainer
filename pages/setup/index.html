<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Get started — Personal Trainer Hub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Poppins:wght@600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../../styles.css" />
    <script>
      if (localStorage.getItem('theme') === 'light') {
        document.documentElement.setAttribute('data-theme', 'light');
      }
    </script>
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="../home/">Personal Trainer Hub</a>
      <nav class="top-nav" aria-label="Primary navigation">
        <a href="../daily-logs/">Daily logs</a>
        <a href="../weekly-review/">My dashboard</a>        <a href="../schedule/">My plan</a>        <a class="nav-cta" href="./">Get started</a>
      </nav>
      <button
        type="button"
        class="theme-toggle"
        id="theme-toggle"
        aria-label="Switch to light mode"
      >
        <svg class="theme-icon theme-icon-sun" viewBox="0 0 24 24" aria-hidden="true">
          <circle cx="12" cy="12" r="4" fill="none" stroke="currentColor" stroke-width="1.75" />
          <path
            d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"
            fill="none"
            stroke="currentColor"
            stroke-width="1.75"
            stroke-linecap="round"
          />
        </svg>
        <svg class="theme-icon theme-icon-moon" viewBox="0 0 24 24" aria-hidden="true">
          <path
            d="M20 14.5A8.5 8.5 0 0 1 9.5 4 6.5 6.5 0 1 0 20 14.5Z"
            fill="none"
            stroke="currentColor"
            stroke-width="1.75"
            stroke-linejoin="round"
          />
        </svg>
      </button>
    </header>

    <main class="app-shell">
      <section class="onboarding-section" id="onboarding">
        <h2>Sign Up</h2>
        <p class="section-intro">
          Let's get the basics down to make the most of every session.
        </p>
        <form id="profile-form">
          <div class="grid">
            <label>
              Name
              <input type="text" name="name" required />
            </label>
            <label>
              Email
              <input type="email" name="email" required />
            </label>
            <label>
              Current weight (lb)
              <input type="number" name="weight" min="1" required />
            </label>
            <label>
              Age
              <input type="number" name="age" min="1" max="120" required />
            </label>
          </div>

          <div class="height-group">
            <span>Height</span>
            <div class="height-inputs">
              <label>
                Feet
                <input type="number" name="height-ft" min="2" max="8" required />
              </label>
              <label>
                Inches
                <input type="number" name="height-in" min="0" max="11" required />
              </label>
            </div>
          </div>

          <label>
            Gender
            <select name="gender" required>
              <option value="">Select</option>
              <option value="female">Female</option>
              <option value="male">Male</option>
              <option value="non-binary">Non-binary</option>
              <option value="prefer-not-to-say">Prefer not to say</option>
            </select>
          </label>

          <button type="submit">Continue to Goals</button>
        </form>
      </section>
    </main>

    <script type="module" src="../../app.js"></script>
  </body>
</html>
