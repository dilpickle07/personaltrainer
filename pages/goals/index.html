<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Select Your Goal — Personal Trainer Hub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../../styles.css" />
    <script>
      if (localStorage.getItem('theme') === 'light') {
        document.documentElement.setAttribute('data-theme', 'light');
      }
    </script>
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="../home/">Personal Trainer Hub</a>
      <nav class="top-nav" aria-label="Primary navigation">
        <a href="../daily-logs/">Daily logs</a>
        <a href="../weekly-review/">My dashboard</a>
        <a href="../schedule/">My plan</a>
        <a class="nav-cta" href="../setup/">Get started</a>
      </nav>
      <button
        type="button"
        class="theme-toggle"
        id="theme-toggle"
        aria-label="Switch to light mode"
      >
        <svg class="theme-icon theme-icon-sun" viewBox="0 0 24 24" aria-hidden="true">
          <circle cx="12" cy="12" r="4" fill="none" stroke="currentColor" stroke-width="1.75" />
          <path
            d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"
            fill="none"
            stroke="currentColor"
            stroke-width="1.75"
            stroke-linecap="round"
          />
        </svg>
        <svg class="theme-icon theme-icon-moon" viewBox="0 0 24 24" aria-hidden="true">
          <path
            d="M20 14.5A8.5 8.5 0 0 1 9.5 4 6.5 6.5 0 1 0 20 14.5Z"
            fill="none"
            stroke="currentColor"
            stroke-width="1.75"
            stroke-linejoin="round"
          />
        </svg>
      </button>
    </header>

    <main class="app-shell">
      <section class="onboarding-section" id="goals-section">
        <h2>What's Your Goal?</h2>
        <p class="section-intro">
          Select 1 or 2 primary fitness goals. This helps us personalize your workout and nutrition plan.
        </p>
        <form id="goals-form">
          <div class="goals-grid">
            <label class="goal-card">
              <input type="checkbox" name="goals" value="fat-loss" />
              <div class="goal-content">
                <h3>Fat Loss</h3>
                <p>Lose weight and reduce body fat while maintaining muscle.</p>
              </div>
            </label>
            <label class="goal-card">
              <input type="checkbox" name="goals" value="muscle-gain" />
              <div class="goal-content">
                <h3>Muscle Gain</h3>
                <p>Build lean muscle mass and increase overall strength.</p>
              </div>
            </label>
            <label class="goal-card">
              <input type="checkbox" name="goals" value="strength" />
              <div class="goal-content">
                <h3>Strength</h3>
                <p>Increase your max lifts and overall power output.</p>
              </div>
            </label>
            <label class="goal-card">
              <input type="checkbox" name="goals" value="endurance" />
              <div class="goal-content">
                <h3>Endurance</h3>
                <p>Build cardiovascular fitness and stamina.</p>
              </div>
            </label>
            <label class="goal-card">
              <input type="checkbox" name="goals" value="general-fitness" />
              <div class="goal-content">
                <h3>General Fitness</h3>
                <p>Improve overall health, mobility, and wellness.</p>
              </div>
            </label>
            <label class="goal-card">
              <input type="checkbox" name="goals" value="age-well" />
              <div class="goal-content">
                <h3>Age Well</h3>
                <p>Stay strong, mobile, and healthy as you grow older.</p>
              </div>
            </label>
          </div>
          <p id="goal-counter" class="goal-counter">Select 1-2 goals</p>
          <button type="submit">Continue</button>
        </form>
      </section>
    </main>

    <script type="module" src="../../app.js"></script>
  </body>
</html>
