<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Personal Trainer Hub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../../styles.css" />
    <script>
      if (localStorage.getItem('theme') === 'light') {
        document.documentElement.setAttribute('data-theme', 'light');
      }
    </script>
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="./">Personal Trainer Hub</a>
      <nav class="top-nav" aria-label="Primary navigation">
        <a href="../daily-logs/">Daily logs</a>
        <a href="../weekly-review/">My dashboard</a>
        <a href="../schedule/">My plan</a>
        <a class="nav-cta" href="../setup/">Get started</a>
      </nav>
      <button
        type="button"
        class="theme-toggle"
        id="theme-toggle"
        aria-label="Switch theme"
      >
        <svg class="theme-icon theme-icon-sun" viewBox="0 0 24 24" aria-hidden="true">
          <circle cx="12" cy="12" r="4" fill="none" stroke="currentColor" stroke-width="1.75" />
          <path
            d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"
            fill="none"
            stroke="currentColor"
            stroke-width="1.75"
            stroke-linecap="round"
          />
        </svg>
        <svg class="theme-icon theme-icon-moon" viewBox="0 0 24 24" aria-hidden="true">
          <path
            d="M20 14.5A8.5 8.5 0 0 1 9.5 4 6.5 6.5 0 1 0 20 14.5Z"
            fill="none"
            stroke="currentColor"
            stroke-width="1.75"
            stroke-linejoin="round"
          />
        </svg>
      </button>
    </header>

    <section class="hero" aria-labelledby="hero-heading">
      <div class="hero-media" role="img" aria-label="Hero background image"></div>
      <div class="hero-content">
        <p class="eyebrow">Training Assistant</p>
        <h1 id="hero-heading">The new you starts today.</h1>
        <p class="hero-copy">
          "If you want something you've never had, you must be willing to do something you've never done." — Thomas Jefferson
        </p>
        <a class="btn btn-clear" href="../onboarding/">Get Started</a>
      </div>
    </section>

    <section class="slot-grid" aria-label="Feature highlights">
      <div class="slot"></div>
      <div class="slot"></div>
      <div class="slot"></div>
    </section>

    <script type="module" src="../../app.js"></script>
  </body>
</html>
